<html lang="en">
<head>
    <title>Login</title>
    <style>
        /* Same styles as registration form */
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Login</h2>
        <form id="loginForm" action="login.php" method="POST" onsubmit="return validateLoginForm()">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <span class="error" id="loginUsernameError"></span>

            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="error" id="loginPasswordError"></span>

            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        function validateLoginForm() {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll(".error").forEach(error => error.textContent = "");

            // Username validation
            const username = document.getElementById("username").value.trim();
            if (username === "") {
                document.getElementById("loginUsernameError").textContent = "Username is required.";
                isValid = false;
            }

            // Password validation
            const password = document.getElementById("password").value;
            if (password === "") {
                document.getElementById("loginPasswordError").textContent = "Password is required.";
                isValid = false;
            }

            return isValid;
        }
    </script>
</body>
</html>
